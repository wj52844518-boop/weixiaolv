name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pyright

      - name: Lint with flake8
        run: |
          flake8 scripts/ --max-line-length=120 --ignore=E501,W503

      - name: Type check with pyright
        run: |
          pip install -q -r requirements.txt 2>/dev/null || true
          pyright scripts/ || true

      - name: Run tests
        run: |
          python -m pytest tests/ -v || echo "No tests found, skipping"

      - name: Validate SKILL.md structure
        run: |
          python -c "
import re
with open('SKILL.md') as f:
    content = f.read()
required = ['trigger_keywords', 'atomic_skill_registry', 'scripts/', 'references/', '2024', '2025']
missing = [k for k in required if k not in content]
if missing:
    print(f'WARNING: Missing content: {missing}')
else:
    print('SKILL.md structure: OK')
"

      - name: Validate plugin.json
        run: |
          python -c "
import json
with open('.claude-plugin/plugin.json') as f:
            data = json.load(f)
required = ['name', 'version', 'description', 'schema_version']
missing = [k for k in required if k not in data]
if missing:
    print(f'ERROR: Missing plugin.json fields: {missing}')
    exit(1)
else:
    print(f'plugin.json: OK (name={data[\"name\"]}, version={data[\"version\"]})')
"
